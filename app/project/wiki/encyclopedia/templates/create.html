{% extends "layout.html" %}

{% block title %}
  Create New Page
{% endblock %}

{% comment %} <head>
  {% load static %}
  <link href="{% static 'tinymce/css/prism.css' %}" rel="stylesheet">
</head>

<body>
  {% for txt in text %}
    <p>{{txt.content|safe}}</p>
  {% endfor %}
</body>

<script src="{% static 'tinymce/js/prism.js' %}"></script> {% endcomment %}

{% block title %}
  {{ title }}
{% endblock %}

{% block body %}
  {{ content|safe }}
{% endblock %}
